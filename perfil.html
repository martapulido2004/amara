<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amara | Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/perfil.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
   <header class="topbar">
     <div class="brand">
      <img src="img/logotipoblanco.png" alt="Amara">
    </div>
    <nav>
      <a class="menu-link menu-link--home" href="home.html">home</a>
      <a class="menu-link menu-link--taller" href="taller.html">taller</a>
      <a class="menu-link menu-link--contacto" href="contacto.html">contáctanos</a>
      <a class="icon active" href="perfil.html" aria-label="Perfil"><img src="img/iconos/perfil.png" alt="Perfil"></a>
      <a class="icon" href="compra.html" aria-label="Carrito"><img src="img/iconos/compra.png" alt="Carrito"></a>
    </nav>
  </header>

 
    <main class="perfil-main">
    <section class="perfil-auth" aria-label="Acceso y registro">
      <article class="auth-card auth-card--switcher" data-auth-switcher>
        <header class="auth-switcher-header">
           
          <h1>¡Qué bueno verte!</h1>
          <p>Inicia sesión o regístrate para guardar tus casas favoritas y avanzar en tu compra.</p>
        </header>

          <div class="auth-switcher-tabs" role="tablist" aria-label="Opciones de acceso">
          <button type="button" class="auth-tab is-active" role="tab" aria-selected="true" aria-controls="panel-login" id="tab-login" data-auth-target="login">
            Iniciar sesión
          </button>
          <button type="button" class="auth-tab" role="tab" aria-selected="false" aria-controls="panel-register" id="tab-register" data-auth-target="register">
            Registrarte
          </button>
        </div>

          <div class="auth-panels">
          <section class="auth-panel is-active" id="panel-login" role="tabpanel" aria-labelledby="tab-login" data-auth-panel="login">
            <h2>Iniciar sesión</h2>
            <form class="auth-form" action="#" method="post">
              <label for="login-email">Email</label>
              <input id="login-email" name="email" type="email" placeholder="Ingresa tu email" required>

              <label for="login-password">Contraseña</label>
              <input id="login-password" name="password" type="password" placeholder="••••••••" required>
              <div class="auth-row">
                <label class="check-row" for="remember-me">
                  <input id="remember-me" type="checkbox" name="remember">
                  <span>Recordarme</span>
                </label>
                <a href="#" class="auth-link">¿Olvidaste tu contraseña?</a>
              </div>

              <button type="submit">Entrar</button>
            </form>
          </section>

        <section class="auth-panel" id="panel-register" role="tabpanel" aria-labelledby="tab-register" aria-hidden="true" data-auth-panel="register">
           <h2>Regístrate</h2>
            <p>Crea una cuenta y elige el plan que mejor se adapte a ti.</p>
            <form class="auth-form" action="#" method="post">
              <div class="auth-two-cols">
                <div class="auth-field">
                  <label for="register-name">Nombre completo</label>
                  <input id="register-name" name="name" type="text" placeholder="Tu nombre" required>
                </div>

          <div class="auth-field">
                  <label for="register-email">Email</label>
                  <input id="register-email" name="email" type="email" placeholder="Ingresa tu email" required>
                </div>
              </div>

            <label for="register-password">Contraseña</label>
              <input id="register-password" name="password" type="password" placeholder="Mínimo 8 caracteres" minlength="8" required>

              
                <fieldset class="subscription-picker">
                <legend class="subscription-title">Elige tu suscripción antes de registrarte</legend>
                <div class="planes-grid planes-grid--register">
                  <label class="plan-choice">
                    <input class="plan-choice__input" id="plan-free" type="radio" name="subscription" value="free" required>
                    <span class="plan-choice__surface plan-card plan-card--free">
                      <span class="plan-choice__copy">
                        <span class="plan-choice__title">RAÍZ</span>
                        <span class="plan-price">0€ / mes</span>
                        <ul>
                          <li>10% en tu primera compra</li>
                          <li>Acceso a talleres y contenidos introductorios</li>
                          <li>Inspiración creativa mensual</li>
                        </ul>
                      </span>
                      <span class="plan-button plan-button--choice">Empezar desde la raíz</span>
                    </span>
                  </label>

                  <label class="plan-choice">
                    <input class="plan-choice__input" id="plan-plus" type="radio" name="subscription" value="plus">
                    <span class="plan-choice__surface plan-card plan-card--plus">
                      <span class="plan-badge">Popular</span>
                      <span class="plan-choice__copy">
                        <span class="plan-choice__title">BROTE</span>
                        <span class="plan-price">12€ / mes</span>
                        <ul>
                          <li>Acceso prioritario a talleres destacados</li>
                          <li>Recursos creativos semanales</li>
                          <li>Pack sorpresa Esencia Amara, con detalles creativos y pequeños objetos de la marca</li>
                        </ul>
                      </span>
                      <span class="plan-button plan-button--choice">Hacer crecer mi proceso</span>
                    </span>
                  </label>

                  <label class="plan-choice">
                    <input class="plan-choice__input" id="plan-premium" type="radio" name="subscription" value="premium">
                    <span class="plan-choice__surface plan-card plan-card--premium">
                      <span class="plan-choice__copy">
                        <span class="plan-choice__title">FLOR</span>
                        <span class="plan-price">25€ / mes</span>
                        <ul>
                          <li>Acceso completo a todos los talleres y recursos</li>
                          <li>Prioridad en lanzamientos, plazas y experiencias especiales</li>
                          <li>Pack de bienvenida Club Amara, con tarjeta de filiación y detalles exclusivos</li>
                        </ul>
                      </span>
                      <span class="plan-button plan-button--choice">Florecer con Amara</span>
                    </span>
                  </label>
                </div>
              </fieldset>

  
          
              <button type="submit">Crear cuenta</button>
            </form>
          </section>
        </div>
      </article>
    </section>

    
  </main>
  

  <footer>
    <script src="js/script.js"></script>
  </footer>
</body>
</html>
